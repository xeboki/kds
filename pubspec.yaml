name: xeboki_kds
description: Xeboki Kitchen Display System — real-time order management for professional kitchens.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management — manual providers only (no code-gen needed)
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Firebase (runtime-initialised — no google-services.json)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.0.0

  # Audio alerts
  audioplayers: ^6.0.0

  # Storage
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Printing
  flutter_pos_printer_platform_image_3: ^1.0.8

  # HTTP
  http: ^1.2.2

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^8.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/audio/
